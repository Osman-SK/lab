apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd10
  name: httpd10
spec:
  replicas: 10
  selector:
    matchLabels:
      app: httpd10
  template:
    metadata:
      labels:
        app: httpd10
    spec:
      containers:
        - image: httpd:alpine3.18
          name: httpd
  strategy: {}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
