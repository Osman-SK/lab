apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd10
  name: httpd10
spec:
  replicas: 10
  selector:
    matchLabels:
      app: httpd10
  strategy: {}
  template:
    metadata:
      labels:
        app: httpd10
    spec:
      containers:
      - image: httpd
        name: httpd
