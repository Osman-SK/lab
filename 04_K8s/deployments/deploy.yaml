apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd10
  name: httpd10
spec:
  replicas: 10
  selector:
    matchLabels:
      app: httpd10
  template:
    metadata:
      labels:
        app: httpd10
    spec:
      containers:
        - image: httpd:alpine3.19
          name: httpd
          command: ["/bin/bash","-c"] # override the default cmd
          args: ["sleep 5; exit 1"] #sleep for 30secs and then exit w/ error
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
